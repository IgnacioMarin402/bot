# fly.toml app configuration file generated for bot-chuleta on 2026-07-13T02:02:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-chuleta'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# ⚠️ PERSISTENCIA (CRÍTICO): sin esto, el disco del contenedor es EFÍMERO y
# cada deploy/reinicio BORRA los SQLite (memoria de los bots + datos de
# Daniela). Para activarla:
#   1. Crear el volumen (una sola vez):  fly volumes create datos --region iad --size 1
#   2. Descomentar los dos bloques de abajo
#   3. fly deploy
# [mounts]
#   source = 'datos'
#   destination = '/data'
#
# [env]
#   DATOS_DIR = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
